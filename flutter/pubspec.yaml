name: zixflow_flutter_demo
description: Feature demo for the Zixflow Flutter SDK.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  zixflow: ^1.1.5
  firebase_core: ^4.12.0
  firebase_messaging: ^16.4.2
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
