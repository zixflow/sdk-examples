name: zixflow_flutter_demo
description: Feature demo for the Zixflow Flutter SDK.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  zixflow: ^1.1.5
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.0

  # Push rich media: download image_url/large_icon_url to a temp file for
  # BigPictureStyle (Android) / attachments (iOS).
  http: ^1.2.0
  path_provider: ^2.1.0

  # Opens the `deeplink_url` / action button deeplink when a notification
  # (or action button) is tapped.
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
